<style>

  *{box-sizing:border-box;}
  html,body{margin:0;background:#160d05;}
  @keyframes fy-dust{0%{transform:translate3d(0,0,0);opacity:0}12%{opacity:.6}82%{opacity:.3}100%{transform:translate3d(var(--dx,14px),-170px,0);opacity:0}}
  @keyframes fy-shimmer{0%,100%{opacity:.55}50%{opacity:.92}}
  @keyframes fy-hint{0%,100%{opacity:.55;transform:translateY(0)}50%{opacity:1;transform:translateY(3px)}}
  @keyframes fy-eq{0%,100%{height:22%}50%{height:100%}}
  @keyframes fy-flicker{0%,100%{opacity:.75}45%{opacity:1}60%{opacity:.82}}
  @keyframes fy-twinkle{0%,100%{opacity:.25}50%{opacity:1}}
  @keyframes fy-float{0%,100%{translate:0 0}50%{translate:0 -11px}}
  @keyframes fy-drift{0%,100%{transform:translate(0,0)}50%{transform:translate(42px,-28px)}}
  @keyframes fy-drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-46px,22px)}}
  @keyframes fy-spin{to{transform:rotate(360deg)}}
  @keyframes fy-fall{0%{transform:translateX(var(--r)) scale(1);opacity:0}14%{opacity:1}78%{opacity:.85}100%{transform:translateX(7px) scale(.25);opacity:0}}
  @keyframes fy-driftout{0%{transform:translateX(var(--r)) scale(1);opacity:0}16%{opacity:.95}100%{transform:translateX(var(--r2)) scale(.3);opacity:0}}
</style>

    <linearGradient id="aGold" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8a5e22"></stop><stop offset="0.5" stop-color="#f4dfa4"></stop><stop offset="1" stop-color="#8a5e22"></stop></linearGradient>
    <linearGradient id="colShade" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#6e4e1e"></stop><stop offset="0.16" stop-color="#b88f44"></stop><stop offset="0.5" stop-color="#f6e6b4"></stop><stop offset="0.84" stop-color="#a9823c"></stop><stop offset="1" stop-color="#5e441a"></stop></linearGradient>

    <linearGradient id="ped" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#6e503a"></stop><stop offset="0.5" stop-color="#cbb68f"></stop><stop offset="1" stop-color="#5e463260"></stop></linearGradient>

    <!-- VIGNETTE (warm) -->
    <div style="position:absolute; inset:0; pointer-events:none; background:radial-gradient(126% 96% at 50% 50%, transparent 52%, rgba(5,8,16,.74) 100%);"></div>

      <span class="fy-lang-btn" data-lang-btn="zh" style="padding:7px 14px; color:#08152e; background:#bcd8ff;">中</span>

      <div style="position:absolute; left:50%; top:50%; width:80%; height:80%; transform:translate(-50%,-50%); border-radius:50%; background:radial-gradient(circle, rgba(4,8,18,.82) 30%, rgba(4,8,18,.3) 58%, rgba(4,8,18,0) 74%);"></div>
      <div style="position:absolute; left:50%; top:50%; width:84%; height:84%; transform:translate(-50%,-50%); border-radius:50%; border:1.5px solid rgba(150,212,255,.5); box-shadow:0 0 22px 3px rgba(70,160,255,.4), 0 0 60px 14px rgba(40,120,235,.2), inset 0 0 26px 5px rgba(80,170,255,.28); filter:blur(1.5px);"></div>

<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  rootRef = (el) => {
    if (this._root === el) return;
    if (this._cleanup) this._cleanup();
    this._root = el;
    if (!el) return;

    const scene = el.querySelector('.fy-scene');
    const world = el.querySelector('.fy-world');

    // ---- language (shared with Works via localStorage) ----
    let _lang = 'zh';
    try { _lang = localStorage.getItem('zoe_lang') || 'zh'; } catch (e) {}
    if (_lang !== 'en' && _lang !== 'zh') _lang = 'zh';
    this._lang = _lang;
    const applyLang = (l) => {
      this._lang = l;
      el.querySelectorAll('.fy-i18n').forEach((n) => {
        const t = n.getAttribute(l === 'en' ? 'data-en' : 'data-zh');
        if (t != null) n.textContent = t;
      });
      el.querySelectorAll('.fy-lang-btn').forEach((b) => {
        const active = b.getAttribute('data-lang-btn') === l;
        const inEnt = !!(b.closest && b.closest('.fy-entrance'));
        const accent = inEnt ? '#bcd8ff' : '#eccf86';
        const accentText = inEnt ? '#08152e' : '#0e1626';
        const idle = inEnt ? 'rgba(200,222,255,.85)' : 'rgba(246,236,210,.85)';
        b.style.background = active ? accent : 'transparent';
        b.style.color = active ? accentText : idle;
      });
      try { localStorage.setItem('zoe_lang', l); } catch (e) {}
    };
    this._applyLang = applyLang;
    el.querySelectorAll('.fy-lang-btn').forEach((b) => {
      b.addEventListener('click', (ev) => { ev.stopPropagation(); applyLang(b.getAttribute('data-lang-btn')); });
    });
    applyLang(_lang);
    this.buildStars(el, '.fy-sky', 210, 18);
    this.buildStars(el, '.fy-ent-stars', 120, 8);
    this.buildParticles(el);
    this.floatArt(world);

    const rnd = (a, b) => a + Math.random() * (b - a);
    const sky = el.querySelector('.fy-sky');
    if (this._meteorTimer) { clearTimeout(this._meteorTimer); this._meteorTimer = null; }
    const spawnMeteor = () => {
      if (sky && sky.querySelectorAll('[data-meteor]').length < 2) {
        const angle = rnd(20, 32), dist = rnd(440, 700), len = rnd(90, 200), dur = rnd(820, 1180);
        const rad = angle * Math.PI / 180, dx = Math.cos(rad) * dist, dy = Math.sin(rad) * dist;
        const m = document.createElement('div');
        m.setAttribute('data-meteor', '1');
        m.style.cssText = 'position:absolute; left:' + rnd(4, 64).toFixed(1) + '%; top:' + rnd(2, 44).toFixed(1) + '%; width:' + len.toFixed(0) + 'px; height:2px; border-radius:2px; background:linear-gradient(90deg, rgba(255,255,255,0), rgba(224,234,255,.95)); filter:drop-shadow(0 0 6px rgba(170,198,255,.85)); transform:rotate(' + angle.toFixed(1) + 'deg); opacity:0; pointer-events:none;';
        sky.appendChild(m);
        const anim = m.animate([
          { opacity: 0, transform: 'translate(0px,0px) rotate(' + angle.toFixed(1) + 'deg)' },
          { opacity: 1, offset: 0.14 },
          { opacity: 1, offset: 0.82 },
          { opacity: 0, transform: 'translate(' + dx.toFixed(0) + 'px,' + dy.toFixed(0) + 'px) rotate(' + angle.toFixed(1) + 'deg)' }
        ], { duration: dur, easing: 'cubic-bezier(.42,0,.36,1)' });
        anim.onfinish = () => m.remove();
        setTimeout(() => m.remove(), dur + 400);
      }
      this._meteorTimer = setTimeout(spawnMeteor, rnd(3200, 7000));
    };
    this._meteorTimer = setTimeout(spawnMeteor, 1600);

    const render = () => { if (world) world.style.transform = 'none'; };

    // ---- music player · 5 tracks, default paused ----
    const TRACKS = [
      { t: 'The Rationality of the Starry Sky', src: 'assets/music/the-rationality-of-the-starry-sky.mp3' },
      { t: 'Floating Stardust', src: 'assets/music/floating-stardust.mp3' },
      { t: 'The Solitary Stargazer', src: 'assets/music/the-solitary-stargazer.mp3' },
      { t: 'Whispers of Dark Matter', src: 'assets/music/whispers-of-dark-matter.mp3' },
      { t: 'Poetic Fall', src: 'assets/music/poetic-fall.mp3' }
    ];
    const audio = el.querySelector('.fy-song');
    const player = el.querySelector('.fy-player');
    const playBtn = el.querySelector('.fy-play');
    const nameEl = el.querySelector('.fy-track-name');
    const listEl = el.querySelector('.fy-tracklist');
    const nextBtn = el.querySelector('.fy-next');
    const shufBtn = el.querySelector('.fy-shuf');
    const muteBtn = el.querySelector('.fy-mute');
    const eqBars = playBtn ? playBtn.querySelectorAll('i') : [];
    const setEq = (on) => eqBars.forEach(b => { b.style.animationPlayState = on ? 'running' : 'paused'; });
    let st = { i: 0, muted: false, shuffle: false };
    try { st = Object.assign(st, JSON.parse(localStorage.getItem('fy-music') || '{}')); } catch (e) {}
    if (!(st.i >= 0 && st.i < TRACKS.length)) st.i = 0;
    const save = () => { try { localStorage.setItem('fy-music', JSON.stringify({ i: st.i, muted: !!st.muted, shuffle: !!st.shuffle, time: audio ? audio.currentTime : 0, playing: audio ? !audio.paused : false })); } catch (e) {} };
    const btnOn = (b, on) => { if (!b) return; b.style.color = on ? '#2a1c08' : 'rgba(246,236,210,.75)'; b.style.background = on ? '#eccf86' : 'transparent'; };
    const toggleList = (open) => {
      if (!listEl) return;
      const show = open != null ? open : (listEl.style.display === 'none' || !listEl.style.display);
      listEl.style.display = show ? 'flex' : 'none';
    };
    const renderList = () => {
      if (!listEl) return;
      listEl.innerHTML = '';
      TRACKS.forEach((tr, i) => {
        const d = document.createElement('div');
        d.textContent = tr.t;
        const cur = i === st.i;
        d.style.cssText = 'padding:9px 13px; border-radius:9px; cursor:pointer; font-size:11.5px; letter-spacing:.06em; white-space:nowrap; transition:background .2s ease;' + (cur ? 'color:#f6e6bd; background:rgba(236,207,134,.16);' : 'color:rgba(246,236,210,.8); background:transparent;');
        d.addEventListener('mouseenter', () => { if (i !== st.i) d.style.background = 'rgba(236,207,134,.09)'; });
        d.addEventListener('mouseleave', () => { if (i !== st.i) d.style.background = 'transparent'; });
        d.addEventListener('click', (e) => { e.stopPropagation(); setTrack(i, true); toggleList(false); });
        listEl.appendChild(d);
      });
    };
    const setTrack = (i, play) => {
      st.i = i; save();
      if (nameEl) nameEl.textContent = TRACKS[i].t;
      renderList();
      if (audio) {
        audio.src = TRACKS[i].src;
        if (play) audio.play().catch(() => {});
      }
    };
    const pickNext = (play) => {
      let n;
      if (st.shuffle && TRACKS.length > 1) { do { n = Math.floor(Math.random() * TRACKS.length); } while (n === st.i); }
      else n = (st.i + 1) % TRACKS.length;
      setTrack(n, play);
    };
    if (audio) {
      audio.volume = 0.7;
      audio.muted = !!st.muted;
      audio.addEventListener('play', () => { setEq(true); save(); });
      audio.addEventListener('pause', () => { setEq(false); save(); });
      audio.addEventListener('ended', () => pickNext(true));
      let _lt = 0;
      audio.addEventListener('timeupdate', () => { const t = Date.now(); if (t - _lt > 1500) { _lt = t; save(); } });
    }
    if (playBtn) playBtn.addEventListener('click', (e) => { e.stopPropagation(); if (!audio) return; if (audio.paused) audio.play().catch(() => {}); else audio.pause(); });
    if (nameEl) nameEl.addEventListener('click', (e) => { e.stopPropagation(); toggleList(); });
    if (nextBtn) nextBtn.addEventListener('click', (e) => { e.stopPropagation(); pickNext(audio ? !audio.paused : false); });
    if (shufBtn) shufBtn.addEventListener('click', (e) => { e.stopPropagation(); st.shuffle = !st.shuffle; save(); btnOn(shufBtn, st.shuffle); });
    if (muteBtn) muteBtn.addEventListener('click', (e) => { e.stopPropagation(); st.muted = !st.muted; save(); if (audio) audio.muted = st.muted; btnOn(muteBtn, st.muted); });
    if (player) player.addEventListener('click', (e) => e.stopPropagation());
    document.addEventListener('click', this._docClose = () => toggleList(false));
    btnOn(shufBtn, st.shuffle); btnOn(muteBtn, st.muted);
    setTrack(st.i, false);
    const seekSaved = () => { if (!audio || !(st.time > 0)) return; const go = () => { try { if (isFinite(audio.duration) && st.time < audio.duration) audio.currentTime = st.time; } catch (e) {} }; if (audio.readyState >= 1) go(); else audio.addEventListener('loadedmetadata', go, { once: true }); };
    seekSaved();
    this._resumeMusic = () => { if (!audio) return; seekSaved(); audio.play().catch(() => {}); };

    const ent = el.querySelector('.fy-entrance');
    const cor = el.querySelector('.fy-corridor');
    const enter = () => {
      if (this._entered) return; this._entered = true;
      if (st.playing && this._resumeMusic) this._resumeMusic();
      const hole = el.querySelector('.fy-hole');
      const glow = el.querySelector('.fy-hole-glow');
      const btn = el.querySelector('.fy-enter-btn');
      if (btn) btn.style.opacity = '0';
      if (glow) glow.style.opacity = '0';
      if (hole) hole.style.transform = 'translate(-50%,-50%) scale(11)';
      setTimeout(() => {
        if (cor) { cor.style.opacity = '1'; cor.style.transform = 'scale(1)'; cor.style.pointerEvents = 'auto'; }
      }, 620);
      setTimeout(() => {
        if (ent) { ent.style.opacity = '0'; ent.style.pointerEvents = 'none'; }
      }, 840);
    };
    const back = () => {
      if (!this._entered) return; this._entered = false;
      render();
      if (cor) { cor.style.opacity = '0'; cor.style.transform = 'scale(1.06)'; cor.style.pointerEvents = 'none'; }
      const hole = el.querySelector('.fy-hole');
      const glow = el.querySelector('.fy-hole-glow');
      const btn = el.querySelector('.fy-enter-btn');
      if (hole) hole.style.transform = 'translate(-50%,-50%) scale(1)';
      if (glow) glow.style.opacity = '1';
      if (btn) btn.style.opacity = '1';
      if (ent) { ent.style.opacity = '1'; ent.style.pointerEvents = 'auto'; }
    };
    if (ent) ent.addEventListener('click', enter);
    const bb = el.querySelector('.fy-back-btn');
    if (bb) bb.addEventListener('click', (e) => { e.stopPropagation(); back(); });

    if (location.search.indexOf('enter=1') !== -1) {
      this._entered = true;
      if (ent) { ent.style.opacity = '0'; ent.style.pointerEvents = 'none'; }
      if (cor) { cor.style.opacity = '1'; cor.style.transform = 'scale(1)'; cor.style.pointerEvents = 'auto'; }
      if (st.playing && this._resumeMusic) this._resumeMusic();
    }
    this._cleanup = () => {
      if (this._meteorTimer) { clearTimeout(this._meteorTimer); this._meteorTimer = null; }
      if (this._docClose) { document.removeEventListener('click', this._docClose); this._docClose = null; }
    };
    render();
  };

  buildStars(root, sel, count, brightCount) {
    const tgt = root && root.querySelector(sel);
    if (!tgt || tgt._stars) return; tgt._stars = true;
    const rnd = (a, b) => a + Math.random() * (b - a);
    let html = '';
    for (let i = 0; i < count; i++) {
      const x = rnd(0, 100).toFixed(2), y = (Math.pow(Math.random(), 1.15) * 100).toFixed(2), s = rnd(0.7, 2.3).toFixed(2);
      html += `<i style="position:absolute;left:${x}%;top:${y}%;width:${s}px;height:${s}px;border-radius:50%;background:#fdf6e6;box-shadow:0 0 ${(s * 2.4).toFixed(1)}px rgba(255,246,220,.7);animation:fy-twinkle ${rnd(2.4, 6).toFixed(2)}s ease-in-out infinite ${rnd(0, 6).toFixed(2)}s;"></i>`;
    }
    for (let i = 0; i < brightCount; i++) {
      const x = rnd(6, 94).toFixed(2), y = (Math.pow(Math.random(), 1.15) * 96).toFixed(2), s = rnd(2.6, 3.9).toFixed(2), col = Math.random() < 0.5 ? '#dce6ff' : '#ffe7bd';
      html += `<i style="position:absolute;left:${x}%;top:${y}%;width:${s}px;height:${s}px;border-radius:50%;background:${col};box-shadow:0 0 ${(s * 3).toFixed(1)}px ${col};animation:fy-twinkle ${rnd(3, 7).toFixed(2)}s ease-in-out infinite ${rnd(0, 5).toFixed(2)}s;"></i>`;
    }
    const layer = document.createElement('div');
    layer.style.cssText = 'position:absolute; inset:0; pointer-events:none;';
    layer.innerHTML = html;
    tgt.appendChild(layer);
  }

  buildParticles(root) {
    const box = root && root.querySelector('.fy-particles');
    if (!box || box._p) return; box._p = true;
    const hole = root.querySelector('.fy-hole');
    const HW = (hole && hole.clientWidth) || 460;
    const R = HW * 0.42;
    const rnd = (a, b) => a + Math.random() * (b - a);
    const g = () => ((Math.random() + Math.random() + Math.random()) / 3 - 0.5) * 2;
    let html = '';
    for (let i = 0; i < 170; i++) {
      const r = (R + g() * R * 0.10).toFixed(1);
      const sz = rnd(0.8, 3.0).toFixed(2), hsz = (sz / 2).toFixed(2);
      const orbit = rnd(34, 80).toFixed(1), od = (-rnd(0, 80)).toFixed(1);
      const tw = rnd(1.4, 4.2).toFixed(2), td = (-rnd(0, 4)).toFixed(2);
      html += '<div style="position:absolute; left:50%; top:50%; animation:fy-spin ' + orbit + 's linear infinite ' + od + 's;">'
           +  '<i style="position:absolute; left:0; top:0; width:' + sz + 'px; height:' + sz + 'px; margin:-' + hsz + 'px; border-radius:50%; background:#e4f2ff; box-shadow:0 0 ' + (sz * 3).toFixed(1) + 'px rgba(120,200,255,1), 0 0 ' + (sz * 6.5).toFixed(1) + 'px rgba(56,150,255,.6); transform:translateX(' + r + 'px); animation:fy-twinkle ' + tw + 's ease-in-out infinite ' + td + 's;"></i>'
           +  '</div>';
    }
    for (let i = 0; i < 48; i++) {
      const r = (R + g() * R * 0.06).toFixed(1);
      const r2 = (parseFloat(r) + rnd(R * 0.18, R * 0.6)).toFixed(1);
      const sz = rnd(0.7, 2.2).toFixed(2), hsz = (sz / 2).toFixed(2);
      const orbit = rnd(40, 90).toFixed(1), od = (-rnd(0, 80)).toFixed(1);
      const fall = rnd(3.2, 7).toFixed(2), fd = (-rnd(0, 7)).toFixed(2);
      html += '<div style="position:absolute; left:50%; top:50%; animation:fy-spin ' + orbit + 's linear infinite ' + od + 's;">'
           +  '<i style="position:absolute; left:0; top:0; width:' + sz + 'px; height:' + sz + 'px; margin:-' + hsz + 'px; border-radius:50%; background:#d6eeff; box-shadow:0 0 ' + (sz * 3).toFixed(1) + 'px rgba(110,195,255,.95); --r:' + r + 'px; --r2:' + r2 + 'px; animation:fy-driftout ' + fall + 's ease-out infinite ' + fd + 's;"></i>'
           +  '</div>';
    }
    box.insertAdjacentHTML('beforeend', html);
  }

  floatArt(world) {
    const wall = world && world.querySelector('.fy-artwall');
    if (!wall || wall._float) return; wall._float = true;
    const rnd = (a, b) => a + Math.random() * (b - a);
    const cats = [{k:'about',zh:'關於',en:'About'},{k:'cv',zh:'履歷',en:'CV'},{k:'journal',zh:'研究',en:'Research'},{k:'web',zh:'網頁設計',en:'Web'},{k:'graphic',zh:'平面設計',en:'Graphic'},{k:'fashion',zh:'服裝設計',en:'Fashion'},{k:'music',zh:'音樂創作',en:'Music'},{k:'image',zh:'圖像創作',en:'Image'},{k:'contact',zh:'聯絡',en:'Contact'},{k:'writing',zh:'文字創作',en:'Writing'}];
    Array.prototype.forEach.call(wall.children, (f, idx) => {
      const w = f.offsetWidth, h = f.offsetHeight;
      f.style.background = 'transparent';
      f.style.padding = '0';
      f.style.border = '1px solid rgba(140,205,255,.38)';
      f.style.boxShadow = '0 0 15px 2px rgba(70,160,255,.3), inset 0 0 18px 3px rgba(70,160,255,.16)';
      const cat = cats[idx] || cats[0];
      f.innerHTML = '<img src="assets/gallery/' + cat.k + '.webp" alt="' + cat.zh + '" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block;">';
      f.style.transform = '';
      f.style.filter = 'none';
      f.style.animation = 'fy-float ' + rnd(6, 9.5).toFixed(2) + 's ease-in-out infinite ' + rnd(0, 5).toFixed(2) + 's';
      f.style.willChange = 'translate';
      let dots = '';
      const put = (px, py) => {
        const s = rnd(0.9, 2.8).toFixed(2);
        const tw = rnd(1.6, 4.4).toFixed(2), td = (-rnd(0, 4)).toFixed(2);
        dots += '<i style="position:absolute;left:' + px.toFixed(1) + 'px;top:' + py.toFixed(1) + 'px;width:' + s + 'px;height:' + s + 'px;margin:-' + (s / 2).toFixed(2) + 'px;border-radius:50%;background:#e4f2ff;box-shadow:0 0 ' + (s * 3).toFixed(1) + 'px rgba(120,200,255,1), 0 0 ' + (s * 6).toFixed(1) + 'px rgba(56,150,255,.55);animation:fy-twinkle ' + tw + 's ease-in-out infinite ' + td + 's;"></i>';
      };
      const step = 18;
      for (let d = rnd(0, step); d < w; d += rnd(step * 0.7, step * 1.4)) { put(d + rnd(-2, 2), rnd(-3, 3)); put(d + rnd(-2, 2), h + rnd(-3, 3)); }
      for (let d = rnd(0, step); d < h; d += rnd(step * 0.7, step * 1.4)) { put(rnd(-3, 3), d + rnd(-2, 2)); put(w + rnd(-3, 3), d + rnd(-2, 2)); }
      f.insertAdjacentHTML('beforeend', dots);
      f._baseTransform = f.style.transform || '';
      const nav = () => { try { location.href = 'Works.dc.html#' + cat.k; } catch (e) {} };
      f.style.cursor = 'pointer';
      f.style.pointerEvents = 'auto';
      f.style.transition = 'border-color .3s ease, box-shadow .3s ease, transform .35s cubic-bezier(.2,.7,.2,1)';
      const lab = document.createElement('div');
      lab.className = 'fy-i18n';
      lab.setAttribute('data-zh', cat.zh);
      lab.setAttribute('data-en', cat.en);
      lab.textContent = (this._lang === 'en' ? cat.en : cat.zh);
      lab.style.cssText = "position:absolute;left:50%;top:100%;transform:translate(-50%,12px);white-space:nowrap;font-family:'Noto Serif TC',serif;font-weight:500;font-size:18px;letter-spacing:.1em;color:rgba(214,232,255,.94);text-shadow:0 1px 12px rgba(0,0,0,.75);cursor:pointer;pointer-events:auto;padding:6px 10px;transition:color .3s ease;";
      f.appendChild(lab);
      const onHover = () => { f.style.border = '1px solid rgba(184,226,255,.95)'; f.style.boxShadow = '0 0 32px 7px rgba(120,190,255,.55), inset 0 0 24px 5px rgba(120,190,255,.3)'; f.style.transform = f._baseTransform + ' scale(1.07)'; lab.style.color = '#eef7ff'; };
      const offHover = () => { f.style.border = '1px solid rgba(140,205,255,.38)'; f.style.boxShadow = '0 0 15px 2px rgba(70,160,255,.3), inset 0 0 18px 3px rgba(70,160,255,.16)'; f.style.transform = f._baseTransform; lab.style.color = 'rgba(214,232,255,.94)'; };
      f.addEventListener('click', nav);
      lab.addEventListener('click', (e) => { e.stopPropagation(); nav(); });
      f.addEventListener('mouseenter', onHover);
      f.addEventListener('mouseleave', offHover);
      lab.addEventListener('mouseenter', onHover);
      lab.addEventListener('mouseleave', offHover);
    });
  }

  componentWillUnmount() { if (this._cleanup) this._cleanup(); }
  renderVals() { return { rootRef: this.rootRef }; }
}
</script>
